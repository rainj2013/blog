<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rainj2013的博客</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=26a4fb9d">

    <!-- 预加载字体，字体在后台下载，不阻塞首屏 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap"></noscript>

    <link rel="stylesheet" href="style.css?v=b4045d86">
    <script>window.__POSTS_VERSION__ = '3bf0ca6e';</script>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo" onclick="goHome(); return false;">
                <span class="logo-icon">📝</span>
                <span class="logo-text">
                    <span class="logo-name">rainj2013</span>
                    <span class="logo-tagline">技术 · 生活 · 思考</span>
                </span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link active" id="homeLink">首页</a>
                <a href="?about" class="nav-link" id="aboutLink">关于</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="hero" id="heroSection">
                <div class="hero-content">
                    <h2>探索<span class="highlight">技术</span>，分享<span class="highlight">生活</span></h2>
                    <p>分享有意思的技术实践，以及美好的生活。</p>
                </div>
                <div class="hero-decoration"><div class="circle"></div></div>
            </section>

            <section class="posts-section" id="postsSection">
                <div class="posts-header">
                    <h3 class="section-title">
                        文章列表
                        <span class="section-count" id="postCount">0 篇</span>
                    </h3>
                    <div class="posts-header-actions">
                        <div class="tag-dropdown" id="tagDropdown">
                            <button class="tag-dropdown-toggle" id="tagToggle">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                            </button>
                            <div class="tag-dropdown-menu" id="tagFilter"></div>
                        </div>
                        <button class="view-toggle" id="viewToggle" title="切换视图">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                        </button>
                    </div>
                </div>
                <div class="posts-grid" id="postsContainer">
                    <!-- 文章卡片将在这里生成 -->
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">© 2026 rainj2013</p>
            </div>
        </div>
    </footer>

    <!-- marked.js 本地化，省去一次 CDN 请求 -->
    <script src="vendor/marked.min.js?v=e04ae0bf"></script>
    <script src="main.js?v=a4d4dfd7"></script>

    <div id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed;bottom:30px;right:30px;width:48px;height:48px;background:#8b5cf6;border:none;border-radius:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 15px rgba(139,92,246,0.4);">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </div>
</body>
</html>
