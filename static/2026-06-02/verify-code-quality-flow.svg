<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">verify-code-quality 核心流程</title>
  <desc id="desc">业务需求，AI 拆解验收标准，人工确认业务真值，AI 分析影响面，生成验证计划，执行验证，收集 evidence，生成 acceptance matrix，输出 verification report。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="920" height="250" rx="10" fill="#eef2ff"/>
  <text x="34" y="38" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">verify-code-quality：从需求到证据</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#111827">
    <rect x="38" y="68" width="120" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="98" y="95" text-anchor="middle">业务需求</text>
    <line x1="170" y1="90" x2="222" y2="90" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="236" y="68" width="140" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="306" y="87" text-anchor="middle">AI 拆解</text>
    <text x="306" y="104" text-anchor="middle">验收标准</text>
    <line x1="388" y1="90" x2="440" y2="90" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="454" y="68" width="150" height="44" rx="8" fill="#e0e7ff" stroke="#4f46e5"/>
    <text x="529" y="87" text-anchor="middle">人工确认</text>
    <text x="529" y="104" text-anchor="middle">业务真值</text>
    <line x1="616" y1="90" x2="668" y2="90" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="682" y="68" width="160" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="762" y="87" text-anchor="middle">AI 分析</text>
    <text x="762" y="104" text-anchor="middle">影响面</text>
    <line x1="762" y1="116" x2="762" y2="146" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="682" y="158" width="160" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="762" y="177" text-anchor="middle">生成</text>
    <text x="762" y="194" text-anchor="middle">验证计划</text>
    <line x1="668" y1="180" x2="612" y2="180" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="444" y="158" width="154" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="521" y="177" text-anchor="middle">执行测试</text>
    <text x="521" y="194" text-anchor="middle">或人工验证</text>
    <line x1="430" y1="180" x2="374" y2="180" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="236" y="158" width="124" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="298" y="177" text-anchor="middle">收集</text>
    <text x="298" y="194" text-anchor="middle">evidence</text>
    <line x1="222" y1="180" x2="166" y2="180" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="38" y="158" width="114" height="44" rx="8" fill="#ffffff" stroke="#a5b4fc"/>
    <text x="95" y="177" text-anchor="middle">生成</text>
    <text x="95" y="194" text-anchor="middle">report</text>
  </g>
  <text x="38" y="228" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#4338ca">输出：acceptance matrix + verification report</text>
</svg>
